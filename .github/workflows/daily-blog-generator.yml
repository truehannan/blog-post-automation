name: Daily Blog Generator & Publisher

on:
  schedule:
    # Runs daily at 00:00 UTC (5:00 AM PKT)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm init -y
          npm install dotenv @octokit/core

      - name: Run Automation Script
        env:
          # Cloudflare credentials for Direct D1 API requests (no Wrangler CLI needed)
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          
          # APIS & Keys
          GITHUB_MODELS_TOKEN: ${{ secrets.AI_MODELS_TOKEN_GITHUB }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          DEV_TO_API_KEY: ${{ secrets.DEV_TO_API_KEY }}
        run: node generate-post.js
