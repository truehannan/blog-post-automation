name = "blog-automation"
main = "src/index.ts"
type = "module"
compatibility_date = "2024-12-19"
env = "production"

# ============================================
# SCHEDULED TRIGGERS
# ============================================
[[triggers.crons]]
cron = "0 9 * * *"  # Daily at 9 AM UTC

# ============================================
# D1 DATABASE BINDING
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "portfolio-db"
database_id = "c2056789-342d-49b9-9e19-de7a17251713"  # Get from: wrangler d1 create blog_automation_db

# ============================================
# BUILD CONFIGURATION
# ============================================
[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.ts"]

[build.upload]
format = "modules"

# ============================================
# PRODUCTION ENVIRONMENT
# ============================================
[env.production]
vars = { ENVIRONMENT = "production" }

[env.production.secrets]
# Set these with: wrangler secret put SECRET_NAME --env production
GITHUB_TOKEN = ""
UNSPLASH_ACCESS_KEY = ""
FIRECRAWL_API_KEY = ""
DEV_TO_API_KEY = ""

# ============================================
# STAGING ENVIRONMENT (Optional)
# ============================================
[env.staging]
vars = { ENVIRONMENT = "staging" }

[env.staging.secrets]
GITHUB_TOKEN = ""
UNSPLASH_ACCESS_KEY = ""
FIRECRAWL_API_KEY = ""
DEV_TO_API_KEY = ""

# ============================================
# DEVELOPMENT ENVIRONMENT (Optional)
# ============================================
[env.development]
vars = { ENVIRONMENT = "development" }

[env.development.secrets]
GITHUB_TOKEN = ""
UNSPLASH_ACCESS_KEY = ""
FIRECRAWL_API_KEY = ""
DEV_TO_API_KEY = ""[env.staging.vars]
ENVIRONMENT = "staging"

[env.staging.secrets]
GITHUB_TOKEN = ""
UNSPLASH_ACCESS_KEY = ""
FIRECRAWL_API_KEY = ""
DEV_TO_API_KEY = ""

# Environment variables - Development
[env.development.vars]
ENVIRONMENT = "development"

[env.development.secrets]
GITHUB_TOKEN = ""
UNSPLASH_ACCESS_KEY = ""
FIRECRAWL_API_KEY = ""
DEV_TO_API_KEY = ""

# Build configuration
[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.ts"]

# Minify for production
[build.upload]
format = "modules"

# Routes (optional)
[[routes]]
pattern = "https://yourdomain.com/api/*"
zone_name = "yourdomain.com"
custom_domain = true
